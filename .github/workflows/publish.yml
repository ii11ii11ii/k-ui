name: Publish @ii11/k-ui

# Публикация в ПУБЛИЧНЫЙ npm-реестр (npmjs.com) — установка без токена.
# Требуется секрет репозитория NPM_TOKEN (Automation-токен с npmjs.com).
# Триггеры:
#   • release.published — когда создаёте релиз на сайте;
#   • workflow_dispatch — кнопка «Run workflow» на вкладке Actions.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build library
        run: npm run build

      - name: Publish to npm (public)
        run: npm -w packages/core publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
